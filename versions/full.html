<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCue - Show Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface-hover: #222222;
            --border: #333333;
            --primary: #00d4aa;
            --primary-dim: #00a88a;
            --stop: #ff6b35;
            --pause: #ffbe0b;
            --panic: #ff006e;
            --text: #e8e8e8;
            --text-dim: #666666;
            --selected: rgba(0, 212, 170, 0.15);
            --running: rgba(0, 212, 170, 0.25);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--surface);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .show-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .show-title h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .show-title input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .show-title input:hover, .show-title input:focus {
            background: var(--surface-hover);
        }

        .transport {
            display: flex;
            gap: 8px;
        }

        .transport button {
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-go {
            background: var(--primary);
            color: #000;
        }

        .btn-go:hover {
            background: var(--primary-dim);
            transform: translateY(-1px);
        }

        .btn-stop {
            background: var(--stop);
            color: #fff;
        }

        .btn-stop:hover {
            filter: brightness(1.1);
        }

        .btn-panic {
            background: var(--panic);
            color: #fff;
            padding: 12px 16px;
        }

        .btn-panic:hover {
            filter: brightness(1.1);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            transition: all 0.15s ease;
        }

        .header-actions button:hover {
            background: var(--border);
            color: var(--text);
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Cue List */
        .cue-list-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-width: 0;
        }

        .cue-list-header {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cue-list-header h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .cue-list-actions {
            display: flex;
            gap: 4px;
        }

        .cue-list-actions button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .cue-list-actions button:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .cue-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .cue-list::-webkit-scrollbar {
            width: 8px;
        }

        .cue-list::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .cue-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .cue-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            background: var(--surface);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            border-left: 3px solid transparent;
        }

        .cue-item:hover {
            background: var(--surface-hover);
        }

        .cue-item.selected {
            background: var(--selected);
            border-color: var(--primary);
        }

        .cue-item.running {
            background: var(--running);
            border-left-color: var(--primary);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { border-left-color: var(--primary); }
            50% { border-left-color: var(--primary-dim); }
        }

        .cue-number {
            font-size: 11px;
            color: var(--text-dim);
            width: 32px;
            text-align: center;
        }

        .cue-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 4px;
            margin-right: 12px;
            font-size: 14px;
        }

        .cue-name {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cue-duration {
            font-size: 11px;
            color: var(--text-dim);
            margin-left: 12px;
        }

        .cue-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            font-size: 14px;
            gap: 16px;
        }

        .cue-empty-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        /* Editor Panel */
        .editor-panel {
            width: 360px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .editor-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-dim);
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-display {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-input-wrapper:hover .file-input-display {
            border-color: var(--primary);
        }

        .color-picker-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s ease;
        }

        .color-swatch:hover, .color-swatch.selected {
            border-color: #fff;
            transform: scale(1.1);
        }

        .editor-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-delete {
            width: 100%;
            background: transparent;
            border: 1px solid var(--panic);
            color: var(--panic);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.15s ease;
        }

        .btn-delete:hover {
            background: var(--panic);
            color: #fff;
        }

        /* Footer */
        footer {
            background: var(--surface);
            padding: 8px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-dim);
        }

        .status-cue {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-indicator.active {
            background: var(--primary);
            animation: pulse 1s ease-in-out infinite;
        }

        .status-time {
            font-variant-numeric: tabular-nums;
        }

        /* Keyboard hints */
        kbd {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 5px;
            font-size: 10px;
            color: var(--text-dim);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
        }

        .modal h3 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-actions button {
            font-family: inherit;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }

        .modal-actions .btn-cancel {
            background: var(--surface-hover);
            color: var(--text);
        }

        .modal-actions .btn-confirm {
            background: var(--primary);
            color: #000;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Drag and drop */
        .cue-item.dragging {
            opacity: 0.5;
        }

        .cue-item.drag-over {
            border-top: 2px solid var(--primary);
        }
    </style>
</head>
<body>
    <header>
            <div class="show-title">
                <h1>⬡ WebCue</h1>
                <input type="text" id="showName" value="Untitled Show" spellcheck="false">
            </div>
            <div class="transport">
                <button class="btn-stop" id="btnStop" title="Stop (Esc)">■ Stop</button>
                <button class="btn-go" id="btnGo" title="Go (Space)">▶ Go</button>
                <button class="btn-panic" id="btnPanic" title="Panic">◼ Panic</button>
            </div>
            <div class="header-actions">
                <button id="btnNew">New</button>
                <button id="btnOpen">Open</button>
                <button id="btnSave">Save</button>
            </div>
        </header>

    <main>
        <div class="cue-list-container">
            <div class="cue-list-header">
                <h2>Cues</h2>
                <div class="cue-list-actions">
                    <button id="btnAddCue" title="Add Cue">+</button>
                    <button id="btnDuplicate" title="Duplicate">⧉</button>
                </div>
            </div>
            <div class="cue-list" id="cueList">
                <div class="cue-empty" id="cueEmpty">
                    <div class="cue-empty-icon">📋</div>
                    <div>No cues yet</div>
                    <div style="font-size: 12px;">Press <kbd>+</kbd> to add a cue</div>
                </div>
            </div>
        </div>

        <div class="editor-panel">
            <div class="editor-header">
                <h2>Edit Cue</h2>
            </div>
            <div class="editor-content" id="editorContent">
                <div class="editor-empty" id="editorEmpty">
                    <div>Select a cue to edit</div>
                </div>
                <div id="editorForm" style="display: none;">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="cueName" placeholder="Cue name">
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="cueType">
                            <option value="audio">🔊 Audio</option>
                            <option value="video">🎬 Video</option>
                            <option value="wait">⏱ Wait</option>
                            <option value="command">💻 Command</option>
                            <option value="group">📁 Group</option>
                        </select>
                    </div>
                    <div class="form-group file-input-wrapper" id="fileGroup">
                        <label>Media File</label>
                        <input type="file" id="cueFile" accept="audio/*,video/*">
                        <div class="file-input-display" id="fileDisplay">Click to select file...</div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Duration (s)</label>
                            <input type="number" id="cueDuration" placeholder="0" min="0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Fade In (s)</label>
                            <input type="number" id="cueFadeIn" placeholder="0" min="0" step="0.1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Fade Out (s)</label>
                        <input type="number" id="cueFadeOut" placeholder="0" min="0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Volume</label>
                        <input type="range" id="cueVolume" min="0" max="100" value="100" style="width: 100%;">
                    </div>
                    <div class="form-group" id="commandGroup" style="display: none;">
                        <label>Command URL</label>
                        <input type="text" id="cueCommand" placeholder="http://example.com/api">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="cueNotes" placeholder="Notes..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <div class="color-picker-wrapper" id="colorPicker">
                            <div class="color-swatch selected" style="background: var(--primary);" data-color="primary"></div>
                            <div class="color-swatch" style="background: #ff6b35;" data-color="orange"></div>
                            <div class="color-swatch" style="background: #ff006e;" data-color="pink"></div>
                            <div class="color-swatch" style="background: #8338ec;" data-color="purple"></div>
                            <div class="color-swatch" style="background: #3a86ff;" data-color="blue"></div>
                            <div class="color-swatch" style="background: #06d6a0;" data-color="green"></div>
                            <div class="color-swatch" style="background: #ffbe0b;" data-color="yellow"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="editor-footer" id="editorFooter" style="display: none;">
                <button class="btn-delete" id="btnDeleteCue">Delete Cue</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="status-cue">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusCue">No cue playing</span>
        </div>
        <div class="status-time">
            <span id="statusTime">00:00.00</span>
        </div>
    </footer>

    <div class="modal-overlay" id="newShowModal">
        <div class="modal">
            <h3>New Show</h3>
            <p style="color: var(--text-dim); font-size: 13px;">This will clear all current cues. Continue?</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="newShowCancel">Cancel</button>
                <button class="btn-confirm" id="newShowConfirm">New Show</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script>
        // State
        let show = {
            name: 'Untitled Show',
            cues: []
        };
        let selectedCueIndex = -1;
        let runningCueIndex = -1;
        let audioContext = null;
        let currentAudio = null;
        let currentVideo = null;
        let startTime = 0;
        let animationFrame = null;

        // DOM Elements
        const cueList = document.getElementById('cueList');
        const cueEmpty = document.getElementById('cueEmpty');
        const editorEmpty = document.getElementById('editorEmpty');
        const editorForm = document.getElementById('editorForm');
        const editorFooter = document.getElementById('editorFooter');
        const showNameInput = document.getElementById('showName');
        const statusCue = document.getElementById('statusCue');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusTime = document.getElementById('statusTime');
        const toast = document.getElementById('toast');

        // Audio/Video elements
        let audioElement = null;
        let videoElement = null;

        // Initialize
        function init() {
            loadFromLocalStorage();
            renderCueList();
            setupEventListeners();
            setupKeyboardShortcuts();
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('btnGo').addEventListener('click', goCue);
            document.getElementById('btnStop').addEventListener('click', stopCue);
            document.getElementById('btnPanic').addEventListener('click', panic);
            document.getElementById('btnAddCue').addEventListener('click', addCue);
            document.getElementById('btnDuplicate').addEventListener('click', duplicateCue);
            document.getElementById('btnDeleteCue').addEventListener('click', deleteCue);
            document.getElementById('btnNew').addEventListener('click', showNewModal);
            document.getElementById('btnOpen').addEventListener('click', openShow);
            document.getElementById('btnSave').addEventListener('click', saveShow);

            document.getElementById('newShowCancel').addEventListener('click', hideNewModal);
            document.getElementById('newShowConfirm').addEventListener('click', newShow);

            showNameInput.addEventListener('input', (e) => {
                show.name = e.target.value;
                saveToLocalStorage();
            });

            // Editor form listeners
            ['cueName', 'cueType', 'cueDuration', 'cueFadeIn', 'cueFadeOut', 'cueVolume', 'cueCommand', 'cueNotes'].forEach(id => {
                document.getElementById(id).addEventListener('input', updateSelectedCue);
            });

            document.getElementById('cueType').addEventListener('change', (e) => {
                const fileGroup = document.getElementById('fileGroup');
                const commandGroup = document.getElementById('commandGroup');
                if (e.target.value === 'audio' || e.target.value === 'video') {
                    fileGroup.style.display = 'block';
                    commandGroup.style.display = 'none';
                } else if (e.target.value === 'command') {
                    fileGroup.style.display = 'none';
                    commandGroup.style.display = 'block';
                } else {
                    fileGroup.style.display = 'none';
                    commandGroup.style.display = 'none';
                }
                updateSelectedCue();
            });

            document.getElementById('cueFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    document.getElementById('fileDisplay').textContent = file.name;
                    if (selectedCueIndex >= 0) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            show.cues[selectedCueIndex].fileData = ev.target.result;
                            saveToLocalStorage();
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });

            document.getElementById('colorPicker').addEventListener('click', (e) => {
                if (e.target.classList.contains('color-swatch')) {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                    e.target.classList.add('selected');
                    updateSelectedCue();
                }
            });

            // File input for opening shows
            document.getElementById('fileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            show = JSON.parse(ev.target.result);
                            showNameInput.value = show.name;
                            selectedCueIndex = -1;
                            runningCueIndex = -1;
                            renderCueList();
                            saveToLocalStorage();
                            showToast('Show loaded');
                        } catch (err) {
                            showToast('Error loading show file');
                        }
                    };
                    reader.readAsText(file);
                }
            });
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                if (e.code === 'Space') {
                    e.preventDefault();
                    goCue();
                } else if (e.code === 'Escape') {
                    stopCue();
                } else if (e.code === 'Enter') {
                    if (selectedCueIndex >= 0) {
                        fireCue(selectedCueIndex);
                    }
                } else if (e.code === 'Delete') {
                    if (selectedCueIndex >= 0) {
                        deleteCue();
                    }
                } else if (e.code === 'ArrowDown') {
                    e.preventDefault();
                    if (selectedCueIndex < show.cues.length - 1) {
                        selectedCueIndex++;
                        renderCueList();
                        loadCueIntoEditor();
                    }
                } else if (e.code === 'ArrowUp') {
                    e.preventDefault();
                    if (selectedCueIndex > 0) {
                        selectedCueIndex--;
                        renderCueList();
                        loadCueIntoEditor();
                    }
                }
            });
        }

        // Cue Management
        function addCue() {
            const newCue = {
                id: Date.now(),
                name: `Cue ${show.cues.length + 1}`,
                type: 'audio',
                duration: 0,
                fadeIn: 0,
                fadeOut: 0,
                volume: 100,
                color: 'primary',
                notes: '',
                fileData: null
            };
            show.cues.push(newCue);
            selectedCueIndex = show.cues.length - 1;
            renderCueList();
            loadCueIntoEditor();
            saveToLocalStorage();
            showToast('Cue added');
        }

        function duplicateCue() {
            if (selectedCueIndex < 0) return;
            const cue = show.cues[selectedCueIndex];
            const newCue = { ...cue, id: Date.now(), name: cue.name + ' (copy)' };
            show.cues.splice(selectedCueIndex + 1, 0, newCue);
            selectedCueIndex++;
            renderCueList();
            loadCueIntoEditor();
            saveToLocalStorage();
            showToast('Cue duplicated');
        }

        function deleteCue() {
            if (selectedCueIndex < 0) return;
            show.cues.splice(selectedCueIndex, 1);
            selectedCueIndex = Math.min(selectedCueIndex, show.cues.length - 1);
            renderCueList();
            loadCueIntoEditor();
            saveToLocalStorage();
            showToast('Cue deleted');
        }

        function updateSelectedCue() {
            if (selectedCueIndex < 0) return;
            const cue = show.cues[selectedCueIndex];
            cue.name = document.getElementById('cueName').value;
            cue.type = document.getElementById('cueType').value;
            cue.duration = parseFloat(document.getElementById('cueDuration').value) || 0;
            cue.fadeIn = parseFloat(document.getElementById('cueFadeIn').value) || 0;
            cue.fadeOut = parseFloat(document.getElementById('cueFadeOut').value) || 0;
            cue.volume = parseInt(document.getElementById('cueVolume').value) || 100;
            cue.command = document.getElementById('cueCommand').value;
            cue.notes = document.getElementById('cueNotes').value;
            
            const selectedColor = document.querySelector('.color-swatch.selected');
            if (selectedColor) {
                cue.color = selectedColor.dataset.color;
            }

            renderCueList();
            saveToLocalStorage();
        }

        // Playback
        function goCue() {
            if (selectedCueIndex >= 0) {
                fireCue(selectedCueIndex);
            } else if (show.cues.length > 0) {
                fireCue(0);
                selectedCueIndex = 0;
                renderCueList();
            }
        }

        function fireCue(index) {
            stopCue();
            const cue = show.cues[index];
            if (!cue) return;

            runningCueIndex = index;
            startTime = Date.now();
            renderCueList();
            updateStatus();

            if (cue.type === 'audio' || cue.type === 'video') {
                if (cue.fileData) {
                    if (cue.type === 'audio') {
                        playAudio(cue);
                    } else {
                        playVideo(cue);
                    }
                } else {
                    showToast('No media file loaded');
                    runningCueIndex = -1;
                    renderCueList();
                    updateStatus();
                }
            } else if (cue.type === 'wait') {
                setTimeout(() => {
                    if (runningCueIndex === index) {
                        runningCueIndex = -1;
                        renderCueList();
                        updateStatus();
                    }
                }, cue.duration * 1000);
            } else if (cue.type === 'command') {
                if (cue.command) {
                    fetch(cue.command, { mode: 'no-cors' })
                        .catch(() => {})
                        .finally(() => {
                            if (runningCueIndex === index) {
                                runningCueIndex = -1;
                                renderCueList();
                                updateStatus();
                            }
                        });
                }
            }
        }

        function playAudio(cue) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            audioElement = new Audio();
            audioElement.src = cue.fileData;
            audioElement.volume = cue.volume / 100;

            if (cue.fadeIn > 0) {
                audioElement.volume = 0;
                fadeIn(audioElement, cue.volume / 100, cue.fadeIn);
            }

            audioElement.play().catch(() => {
                showToast('Error playing audio');
            });

            audioElement.onended = () => {
                if (runningCueIndex === selectedCueIndex) {
                    runningCueIndex = -1;
                    renderCueList();
                    updateStatus();
                }
            };
        }

        function playVideo(cue) {
            videoElement = document.createElement('video');
            videoElement.src = cue.fileData;
            videoElement.volume = cue.volume / 100;
            videoElement.style.position = 'fixed';
            videoElement.style.top = '0';
            videoElement.style.left = '0';
            videoElement.style.width = '100%';
            videoElement.style.height = '100%';
            videoElement.style.objectFit = 'contain';
            videoElement.style.background = '#000';
            videoElement.style.zIndex = '999';
            document.body.appendChild(videoElement);

            if (cue.fadeIn > 0) {
                videoElement.volume = 0;
                fadeIn(videoElement, cue.volume / 100, cue.fadeIn);
            }

            videoElement.play().catch(() => {
                showToast('Error playing video');
            });

            videoElement.onended = () => {
                if (videoElement && videoElement.parentNode) {
                    videoElement.parentNode.removeChild(videoElement);
                }
                if (runningCueIndex === selectedCueIndex) {
                    runningCueIndex = -1;
                    renderCueList();
                    updateStatus();
                }
            };
        }

        function fadeIn(element, targetVolume, duration) {
            const steps = 50;
            const interval = (duration * 1000) / steps;
            const increment = targetVolume / steps;
            let current = 0;

            const fadeInterval = setInterval(() => {
                current += increment;
                if (current >= targetVolume) {
                    element.volume = targetVolume;
                    clearInterval(fadeInterval);
                } else {
                    element.volume = current;
                }
            }, interval);
        }

        function stopCue() {
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }
            if (videoElement) {
                videoElement.pause();
                if (videoElement.parentNode) {
                    videoElement.parentNode.removeChild(videoElement);
                }
                videoElement = null;
            }
            runningCueIndex = -1;
            renderCueList();
            updateStatus();
        }

        function panic() {
            stopCue();
            showToast('All cues stopped');
        }

        // UI Updates
        function renderCueList() {
            if (show.cues.length === 0) {
                cueEmpty.style.display = 'flex';
                cueList.querySelectorAll('.cue-item').forEach(el => el.remove());
                return;
            }

            cueEmpty.style.display = 'none';

            const existingItems = cueList.querySelectorAll('.cue-item');
            existingItems.forEach(el => el.remove());

            show.cues.forEach((cue, index) => {
                const item = document.createElement('div');
                item.className = 'cue-item';
                if (index === selectedCueIndex) item.classList.add('selected');
                if (index === runningCueIndex) item.classList.add('running');
                item.draggable = true;

                const icons = {
                    audio: '🔊',
                    video: '🎬',
                    wait: '⏱',
                    command: '💻',
                    group: '📁'
                };

                item.innerHTML = `
                    <span class="cue-number">${String(index + 1).padStart(2, '0')}</span>
                    <span class="cue-icon">${icons[cue.type] || '📋'}</span>
                    <span class="cue-name">${cue.name}</span>
                    <span class="cue-duration">${cue.duration > 0 ? cue.duration + 's' : ''}</span>
                `;

                item.addEventListener('click', () => {
                    selectedCueIndex = index;
                    renderCueList();
                    loadCueIntoEditor();
                });

                item.addEventListener('dblclick', () => {
                    fireCue(index);
                });

                // Drag and drop
                item.addEventListener('dragstart', (e) => {
                    item.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', index);
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    item.classList.add('drag-over');
                });

                item.addEventListener('dragleave', () => {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIndex = index;
                    if (fromIndex !== toIndex) {
                        const [moved] = show.cues.splice(fromIndex, 1);
                        show.cues.splice(toIndex, 0, moved);
                        if (selectedCueIndex === fromIndex) {
                            selectedCueIndex = toIndex;
                        } else if (fromIndex < selectedCueIndex && toIndex >= selectedCueIndex) {
                            selectedCueIndex--;
                        } else if (fromIndex > selectedCueIndex && toIndex <= selectedCueIndex) {
                            selectedCueIndex++;
                        }
                        renderCueList();
                        saveToLocalStorage();
                    }
                });

                cueList.appendChild(item);
            });
        }

        function loadCueIntoEditor() {
            if (selectedCueIndex < 0) {
                editorEmpty.style.display = 'flex';
                editorForm.style.display = 'none';
                editorFooter.style.display = 'none';
                return;
            }

            const cue = show.cues[selectedCueIndex];
            editorEmpty.style.display = 'none';
            editorForm.style.display = 'block';
            editorFooter.style.display = 'block';

            document.getElementById('cueName').value = cue.name;
            document.getElementById('cueType').value = cue.type;
            document.getElementById('cueDuration').value = cue.duration || '';
            document.getElementById('cueFadeIn').value = cue.fadeIn || '';
            document.getElementById('cueFadeOut').value = cue.fadeOut || '';
            document.getElementById('cueVolume').value = cue.volume || 100;
            document.getElementById('cueCommand').value = cue.command || '';
            document.getElementById('cueNotes').value = cue.notes || '';
            document.getElementById('fileDisplay').textContent = cue.fileData ? 'File loaded' : 'Click to select file...';

            // Show/hide relevant fields
            const fileGroup = document.getElementById('fileGroup');
            const commandGroup = document.getElementById('commandGroup');
            if (cue.type === 'audio' || cue.type === 'video') {
                fileGroup.style.display = 'block';
                commandGroup.style.display = 'none';
            } else if (cue.type === 'command') {
                fileGroup.style.display = 'none';
                commandGroup.style.display = 'block';
            } else {
                fileGroup.style.display = 'none';
                commandGroup.style.display = 'none';
            }

            // Set color
            document.querySelectorAll('.color-swatch').forEach(s => {
                s.classList.toggle('selected', s.dataset.color === cue.color);
            });
        }

        function updateStatus() {
            if (runningCueIndex >= 0) {
                const cue = show.cues[runningCueIndex];
                statusCue.textContent = `Running: ${cue.name}`;
                statusIndicator.classList.add('active');
            } else {
                statusCue.textContent = 'No cue playing';
                statusIndicator.classList.remove('active');
            }
        }

        function updateTime() {
            if (runningCueIndex >= 0) {
                const elapsed = (Date.now() - startTime) / 1000;
                statusTime.textContent = elapsed.toFixed(2);
            } else {
                statusTime.textContent = '00:00.00';
            }
            animationFrame = requestAnimationFrame(updateTime);
        }

        // Storage
        function saveToLocalStorage() {
            try {
                localStorage.setItem('webcue-show', JSON.stringify(show));
            } catch (e) {
                console.warn('Could not save to localStorage');
            }
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('webcue-show');
                if (saved) {
                    show = JSON.parse(saved);
                    showNameInput.value = show.name;
                }
            } catch (e) {
                console.warn('Could not load from localStorage');
            }
        }

        // Show file operations
        function showNewModal() {
            document.getElementById('newShowModal').classList.add('active');
        }

        function hideNewModal() {
            document.getElementById('newShowModal').classList.remove('active');
        }

        function newShow() {
            show = { name: 'Untitled Show', cues: [] };
            showNameInput.value = show.name;
            selectedCueIndex = -1;
            runningCueIndex = -1;
            renderCueList();
            loadCueIntoEditor();
            saveToLocalStorage();
            hideNewModal();
            showToast('New show created');
        }

        function openShow() {
            document.getElementById('fileInput').click();
        }

        function saveShow() {
            const data = JSON.stringify(show, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (show.name || 'show') + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Show saved');
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Start time updater
        setInterval(() => {
            if (runningCueIndex >= 0) {
                const elapsed = (Date.now() - startTime) / 1000;
                const mins = Math.floor(elapsed / 60);
                const secs = Math.floor(elapsed % 60);
                const ms = Math.floor((elapsed % 1) * 100);
                statusTime.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
            } else {
                statusTime.textContent = '00:00.00';
            }
        }, 50);

        // Initialize
        init();
    </script>
</body>
</html>
